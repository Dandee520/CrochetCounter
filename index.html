<!DOCTYPE html>
<html>
<head>
    <title>Crochet Counter</title>
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <style>
        body {
            font-family: Arial, sans-serif;
            text-align: center;
            margin-top: 40px;
            background-color: #f5f5f5;
        }

        h1 {
            font-size: 36px;
        }

        .counter-container {
            display: flex;
            justify-content: center;
            gap: 50px;
            margin: 20px 0;
        }

        .counter-box {
            text-align: center;
        }

        .count-number {
            font-size: 70px;
            margin: 10px 0;
        }

        button {
            font-size: 20px;
            padding: 10px 20px;
            margin: 5px;
            border: none;
            border-radius: 10px;
            cursor: pointer;
        }

        .increment {
            background-color: #4CAF50;
            color: white;
        }

        .reset {
            background-color: #f44336;
            color: white;
        }

        .rowReset {
            background-color: #ff9800;
            color: white;
        }

        .clearLog {
            background-color: #2196F3;
            color: white;
        }

        #logBoard {
            margin-top: 30px;
            max-width: 400px;
            margin-left: auto;
            margin-right: auto;
        }

        table {
            width: 100%;
            border-collapse: collapse;
            background: white;
            border-radius: 8px;
            overflow: hidden;
        }

        th, td {
            padding: 10px;
            border-bottom: 1px solid #ddd;
        }

        th {
            background-color: #eee;
        }
    </style>
</head>
<body>

    <!-- Image above title -->
    <img src="CrochetCat.jpg" alt="Crochet" style="width:150px; height:auto; margin-bottom:20px; border-radius:10px;">

    <h1>🧶 Crochet Counter</h1>

    <div class="counter-container">
        <!-- Stitch Counter -->
        <div class="counter-box">
            <h3>Stitches</h3>
            <div id="stitchCount" class="count-number">0</div>
            <button class="increment" onclick="incrementStitch()">+ Stitch</button>
            <button class="reset" onclick="resetStitch()">Reset</button>
        </div>

        <!-- Row Counter -->
        <div class="counter-box">
            <h3>Rows</h3>
            <div id="rowCount" class="count-number">0</div>
            <button class="increment" onclick="incrementRow()">+ Row</button>
            <button class="rowReset" onclick="resetRow()">Reset</button>
        </div>
    </div>

    <!-- Log board -->
    <div id="logBoard">
        <h2>Project Log</h2>
        <table>
            <thead>
                <tr>
                    <th>Stitches</th>
                    <th>Rows</th>
                </tr>
            </thead>
            <tbody id="logItems"></tbody>
        </table>
        <br>
        <button class="clearLog" onclick="clearLog()">Clear Log</button>
    </div>

    <script>
        // Load saved values
        let stitchCount = parseInt(localStorage.getItem("stitchCount")) || 0;
        let rowCount = parseInt(localStorage.getItem("rowCount")) || 0;

        let stitchLog = JSON.parse(localStorage.getItem("stitchLog")) || [];

        const stitchDisplay = document.getElementById("stitchCount");
        const rowDisplay = document.getElementById("rowCount");
        const logContainer = document.getElementById("logItems");

        function updateDisplay() {
            stitchDisplay.innerText = stitchCount;
            rowDisplay.innerText = rowCount;

            localStorage.setItem("stitchCount", stitchCount);
            localStorage.setItem("rowCount", rowCount);
        }

        function renderLog() {
            logContainer.innerHTML = "";
            stitchLog.forEach(entry => {
                const row = document.createElement("tr");

                const stitchCell = document.createElement("td");
                stitchCell.innerText = entry.stitches;

                const rowCell = document.createElement("td");
                rowCell.innerText = entry.rows;

                row.appendChild(stitchCell);
                row.appendChild(rowCell);
                logContainer.appendChild(row);
            });
        }

        // Stitch functions
        function incrementStitch() {
            stitchCount++;
            updateDisplay();
        }

        function resetStitch() {
            if (stitchCount > 0 || rowCount > 0) {
                stitchLog.push({
                    stitches: stitchCount,
                    rows: rowCount
                });
                localStorage.setItem("stitchLog", JSON.stringify(stitchLog));
                renderLog();
            }
            stitchCount = 0;
            updateDisplay();
        }

        // Row functions
        function incrementRow() {
            rowCount++;
            updateDisplay();
        }

        function resetRow() {
            rowCount = 0;
            updateDisplay();
        }

        function clearLog() {
            stitchLog = [];
            localStorage.removeItem("stitchLog");
            renderLog();
        }

        // Init
        updateDisplay();
        renderLog();
    </script>

</body>
</html>
