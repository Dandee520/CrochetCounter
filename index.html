<!DOCTYPE html>
<html>
<head>
    <title>Crochet Counter</title>
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <style>
        body {
            font-family: Arial, sans-serif;
            text-align: center;
            margin-top: 80px;
            background-color: #f5f5f5;
        }

        h1 {
            font-size: 40px;
        }

        #count {
            font-size: 80px;
            margin: 20px 0;
        }

        button {
            font-size: 24px;
            padding: 15px 25px;
            margin: 10px;
            border: none;
            border-radius: 10px;
            cursor: pointer;
        }

        .increment {
            background-color: #4CAF50;
            color: white;
        }

        .reset {
            background-color: #f44336;
            color: white;
        }
    </style>
</head>
<body>

    <h1>🧶 Crochet Counter</h1>
    <div id="count">0</div>

    <button class="increment" onclick="increment()">+ Stitch</button>
    <button class="reset" onclick="resetCounter()">Reset</button>

    <script>
        // Load saved count
        let count = localStorage.getItem("crochetCount");

        if (count === null) {
            count = 0;
        } else {
            count = parseInt(count);
        }

        document.getElementById("count").innerText = count;

        function increment() {
            count++;
            updateDisplay();
        }

        function resetCounter() {
            count = 0;
            updateDisplay();
        }

        function updateDisplay() {
            document.getElementById("count").innerText = count;
            localStorage.setItem("crochetCount", count);
        }
    </script>

</body>
</html>
